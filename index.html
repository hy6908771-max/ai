<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Server Lab - AI Assistant</title>
    <style>
        /* Premium Dark Theme Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: #0b141a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #e9edef;
        }

        .chat-container { 
            width: 100%; 
            max-width: 450px; 
            height: 95vh; 
            background: #111b21; 
            display: flex; 
            flex-direction: column; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            border: 1px solid #222e35;
        }

        /* Header Area - Clean & Professional */
        .header { 
            background: #202c33; 
            padding: 15px 18px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid #2d3941;
        }
        .header img { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            border: 2px solid #00a884;
            background: #fff;
        }
        .header-text p { font-weight: 600; font-size: 18px; color: #fff; }
        .header-text span { font-size: 12px; color: #00ff88; display: block; margin-top: -2px; }

        /* Chat Box Content */
        #chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }

        .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14.5px; line-height: 1.5; position: relative; }
        .user { align-self: flex-end; background: #005c4b; border-top-right-radius: 0; color: #fff; }
        .bot { align-self: flex-start; background: #202c33; border-top-left-radius: 0; color: #e9edef; }
        .time { font-size: 10px; opacity: 0.5; display: block; text-align: right; margin-top: 5px; }

        /* Input Area Footer */
        .input-area { padding: 15px; background: #202c33; display: flex; align-items: center; gap: 10px; }
        input { 
            flex: 1; padding: 12px 18px; border-radius: 30px; border: none; 
            background: #2a3942; color: #d1d7db; outline: none; font-size: 15px; 
        }
        button { 
            background: #00a884; border: none; width: 48px; height: 48px; 
            border-radius: 50%; color: white; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transition: 0.3s;
        }
        button:hover { background: #06cf9c; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Header Area with New Name -->
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" alt="Bot Logo">
        <div class="header-text">
            <p>Flexi Server Lab AI</p>
            <span>Online</span>
        </div>
    </div>

    <!-- Chat Messages Box -->
    <div id="chat-box">
        <div class="msg bot">
            আসসালামু আলাইকুম! আমি <b>Flexi Server Lab</b>-এর স্মার্ট AI। আপনাকে কীভাবে সাহায্য করতে পারি?
            <span class="time">Just now</span>
        </div>
    </div>

    <!-- User Input Field -->
    <div class="input-area">
        <input type="text" id="user-input" placeholder="আপনার প্রশ্নটি লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    // আপনার এপিআই কী
    const API_KEY = "AIzaSyCIof-LSXGOjbgv4RAKD-l1HgI_1T5lNtM"; 
    // Gemini Pro API এন্ডপয়েন্ট
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        input.value = '';
        const loading = appendMsg("Flexi AI লিখছে...", 'bot');

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "তুমি Flexi Server Lab-এর সহকারী। ব্যবহারকারীকে সব উত্তর বাংলায় দাও: " + text }] }]
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                loading.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>') + `<span class="time">${getCurrentTime()}</span>`;
            } else {
                loading.innerText = "দুঃখিত, এই মুহূর্তে উত্তর পাওয়া যাচ্ছে না।";
            }
        } catch (e) {
            loading.innerText = "সার্ভার কানেকশন এরর হয়েছে!";
        }
    }

    function appendMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerHTML = t + (s === 'bot' ? '' : `<span class="time">${getCurrentTime()}</span>`);
        const b = document.getElementById('chat-box');
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        return d;
    }

    function getCurrentTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
</script>

</body>
</html>
